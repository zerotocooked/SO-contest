version: 0.0
os: linux

files:
  # Next.js standalone output → root của app dir
  - source: /shop/.next/standalone
    destination: /var/www/so-contest
  # Scripts và nginx config vẫn cần deploy cùng
  - source: /scripts
    destination: /var/www/so-contest/scripts
  - source: /nginx
    destination: /var/www/so-contest/nginx

hooks:
  BeforeInstall:
    - location: scripts/install_dependencies.sh
      timeout: 300
      runas: root

  ApplicationStop:
    - location: scripts/stop_application.sh
      timeout: 60
      runas: root

  ApplicationStart:
    - location: scripts/start_application.sh
      timeout: 120
      runas: root

  ValidateService:
    - location: scripts/validate_service.sh
      timeout: 60
      runas: root
