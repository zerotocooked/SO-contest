version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "=== Install phase ==="
      - cd shop
      - npm ci --prefer-offline

  build:
    commands:
      - echo "=== Build phase ==="
      - npm run build

  post_build:
    commands:
      - echo "=== Post-build: copy static assets ==="
      - cd ..
      - cp -r shop/.next/static shop/.next/standalone/.next/static
      - cp -r shop/public shop/.next/standalone/public

artifacts:
  files:
    - appspec.yml
    - scripts/**/*
    - nginx/**/*
    - shop/.next/standalone/**/*
  discard-paths: no

cache:
  paths:
    - shop/node_modules/**/*
