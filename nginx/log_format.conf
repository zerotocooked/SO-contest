# Nginx log format with detailed timing for CloudWatch analysis
# Referenced by so-contest.conf
# Placed in conf.d/ so nginx includes it inside the http {} block

log_format so_contest '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" '
                      'rt=$request_time '
                      'uct=$upstream_connect_time '
                      'uht=$upstream_header_time '
                      'urt=$upstream_response_time';
